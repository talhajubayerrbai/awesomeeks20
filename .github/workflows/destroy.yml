name: Destroy

on:
  workflow_dispatch:

jobs:
  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.PROJECT_NAME }}-cluster || true

      - name: Delete Kubernetes Ingress and remove finalizers before destroy
        run: |
          # Trigger deletion of the Ingress — this asks the ALB Controller to
          # start deprovisioning the AWS ALB and remove its finalizer.
          kubectl delete ingress -n app ${{ secrets.PROJECT_NAME }}-ingress \
            --ignore-not-found=true --timeout=300s || true

          # Wait up to 3 minutes for the ALB Controller to clean up and the
          # Ingress to disappear on its own (happy path).
          echo "Waiting for Ingress to be fully removed..."
          for i in $(seq 1 18); do
            if ! kubectl get ingress -n app ${{ secrets.PROJECT_NAME }}-ingress \
                 --ignore-not-found 2>/dev/null | grep -q "${{ secrets.PROJECT_NAME }}-ingress"; then
              echo "Ingress is gone."
              break
            fi
            echo "Still present, waiting 10s... (attempt $i/18)"
            sleep 10
          done

          # If the Ingress is still there (ALB Controller too slow or already
          # gone), forcibly strip the finalizer so the object can be deleted.
          # This is safe because we are about to destroy all AWS resources
          # anyway — the ALB itself will be cleaned up via terraform destroy.
          if kubectl get ingress -n app ${{ secrets.PROJECT_NAME }}-ingress \
               --ignore-not-found 2>/dev/null | grep -q "${{ secrets.PROJECT_NAME }}-ingress"; then
            echo "Ingress still present; forcibly removing finalizers..."
            kubectl patch ingress ${{ secrets.PROJECT_NAME }}-ingress -n app \
              --type=json \
              -p='[{"op":"remove","path":"/metadata/finalizers"}]' || true
            # Give Kubernetes a moment to process the patch and delete the object
            sleep 10
          fi

      - name: Terraform Destroy
        working-directory: terraform
        run: |-
          terraform destroy -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_uri=placeholder"
